name: Update live economic calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: node scripts/fetch-calendar.mjs
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - run: |
          git config user.name calendar-bot
          git config user.email actions@users.noreply.github.com
          git add data/calendar.json data/market.json
          git diff --cached --quiet || git commit -m "data: refresh calendar"
          git push
